<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" width="960" height="280" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L10 5 L0 9 Z" fill="#2C3E50"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L10 5 L0 9 Z" fill="#E67E22"/>
    </marker>
  </defs>

  <rect width="960" height="280" fill="#F8FAFC" rx="10"/>

  <!-- Title row: component lifelines -->
  <text x="50" y="30" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">UI / ExpCore</text>
  <text x="255" y="30" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">Pending Buffer</text>
  <text x="470" y="30" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">Promise Queue</text>
  <text x="685" y="30" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">ZMQ Control</text>
  <text x="895" y="30" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">Server Log</text>

  <!-- Lifelines -->
  <line x1="50" y1="45" x2="50" y2="260" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="255" y1="45" x2="255" y2="260" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="470" y1="45" x2="470" y2="260" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="685" y1="45" x2="685" y2="260" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="895" y1="45" x2="895" y2="260" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Phase 1: UI emits marker -->
  <rect x="50" y="60" width="175" height="36" rx="6" fill="#2C3E50"/>
  <text x="138" y="83" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">emitMarker("session_start")</text>

  <line x1="228" y1="78" x2="248" y2="78" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Check if control client ready -->
  <rect x="255" y="58" width="185" height="40" rx="6" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.2"/>
  <text x="348" y="74" font-size="12" fill="#2C3E50" font-weight="bold" text-anchor="middle">Is client ready?</text>
  <text x="348" y="89" font-size="10" fill="#718096" text-anchor="middle">No → push to pendingMarkers[]</text>

  <!-- Arrow to promise queue (when ready) -->
  <line x1="443" y1="78" x2="463" y2="78" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Promise queue serializes -->
  <rect x="470" y="115" width="185" height="52" rx="6" fill="#FFFFFF" stroke="#E67E22" stroke-width="1.5"/>
  <text x="562" y="135" font-size="12" fill="#C05621" font-weight="bold" text-anchor="middle">Serialized Execution</text>
  <text x="562" y="150" font-size="10" fill="#718096" text-anchor="middle">enqueue(fn) → await prev</text>
  <text x="562" y="163" font-size="10" fill="#718096" text-anchor="middle">Guarantees send order</text>

  <!-- Phase 3a: Flush pending markers -->
  <rect x="255" y="115" width="185" height="36" rx="6" fill="#FFF7ED" stroke="#FB9231" stroke-width="1"/>
  <text x="348" y="131" font-size="11" fill="#C05621" font-weight="bold" text-anchor="middle">Init: flush pendingMarkers[]</text>
  <text x="348" y="145" font-size="10" fill="#9C4221" text-anchor="middle">FIFO order preserved</text>

  <line x1="443" y1="133" x2="463" y2="133" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="348" y1="154" x2="348" y2="168" stroke="#CBD5E0" stroke-width="1"/>
  <line x1="348" y1="168" x2="470" y2="168" stroke="#CBD5E0" stroke-width="1"/>
  <line x1="470" y1="168" x2="470" y2="172" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Arrow to ZMQ -->
  <line x1="658" y1="141" x2="678" y2="141" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4: ZMQ Control sends -->
  <rect x="685" y="186" width="175" height="36" rx="6" fill="#2C3E50"/>
  <text x="772" y="209" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">ZMQ Request/Reply</text>

  <!-- Arrow to Server -->
  <line x1="863" y1="204" x2="888" y2="204" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5: Server logs -->
  <rect x="895" y="186" width="45" height="36" rx="6" fill="#E67E22"/>
  <text x="918" y="209" font-size="11" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Log</text>

  <!-- Connection from promise queue down to ZMQ -->
  <line x1="470" y1="170" x2="470" y2="200" stroke="#CBD5E0" stroke-width="1"/>
  <line x1="470" y1="200" x2="685" y2="200" stroke="#CBD5E0" stroke-width="1"/>
  <line x1="685" y1="200" x2="685" y2="179" stroke="#CBD5E0" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Bottom annotation -->
  <rect x="30" y="244" width="900" height="24" rx="4" fill="none" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="260" font-size="10" fill="#718096" text-anchor="middle">Problem addressed: rapid / out-of-order marker calls conflict with ZMQ request/reply ordering</text>
</svg>
