<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" width="960" height="260" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowTime" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L10 5 L0 9 Z" fill="#718096"/>
    </marker>
    <linearGradient id="track1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="30%" stop-color="#2C3E50"/>
      <stop offset="30%" stop-color="#E2E8F0"/>
      <stop offset="45%" stop-color="#E2E8F0"/>
      <stop offset="45%" stop-color="#2C3E50"/>
      <stop offset="70%" stop-color="#2C3E50"/>
      <stop offset="70%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#2C3E50"/>
    </linearGradient>
  </defs>

  <rect width="960" height="260" fill="#F8FAFC" rx="10"/>

  <!-- Time axis -->
  <line x1="140" y1="55" x2="920" y2="55" stroke="#A0AEC0" stroke-width="1"/>
  <text x="920" y="50" font-size="11" fill="#718096" text-anchor="end">time →</text>

  <!-- Track 1: Neural Data -->
  <rect x="20" y="72" width="110" height="52" rx="6" fill="#2C3E50"/>
  <text x="75" y="92" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Neural Data</text>
  <text x="75" y="109" font-size="10" fill="#CBD5E0" text-anchor="middle">EEG stream</text>

  <rect x="140" y="80" width="800" height="36" rx="6" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="1"/>
  <!-- Signal wave pattern -->
  <rect x="155" y="90" width="40" height="16" rx="3" fill="#2C3E50" opacity="0.7"/>
  <rect x="200" y="82" width="30" height="32" rx="3" fill="#2C3E50" opacity="0.5"/>
  <rect x="275" y="87" width="50" height="22" rx="3" fill="#2C3E50" opacity="0.8"/>
  <rect x="380" y="84" width="35" height="24" rx="3" fill="#2C3E50" opacity="0.6"/>
  <rect x="510" y="88" width="45" height="20" rx="3" fill="#2C3E50" opacity="0.7"/>
  <rect x="650" y="85" width="38" height="26" rx="3" fill="#2C3E50" opacity="0.5"/>
  <rect x="790" y="89" width="42" height="18" rx="3" fill="#2C3E50" opacity="0.7"/>

  <!-- Track 2: Marker + Audio + Screenshot -->
  <rect x="20" y="140" width="110" height="52" rx="6" fill="#E67E22"/>
  <text x="75" y="157" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Auxiliary</text>
  <text x="75" y="173" font-size="10" fill="#FED7AA" text-anchor="middle">Marker · Audio · SS</text>

  <rect x="140" y="148" width="800" height="36" rx="6" fill="#FFF7ED" stroke="#FB9231" stroke-width="1"/>
  <!-- Event markers -->
  <rect x="165" y="156" width="6" height="20" rx="2" fill="#E67E22"/>
  <text x="168" y="171" font-size="8" fill="#C05621" text-anchor="middle">M</text>
  <rect x="325" y="156" width="6" height="20" rx="2" fill="#E67E22"/>
  <text x="328" y="171" font-size="8" fill="#C05621" text-anchor="middle">M</text>
  <rect x="490" y="156" width="6" height="20" rx="2" fill="#E67E22"/>
  <text x="493" y="171" font-size="8" fill="#C05621" text-anchor="middle">M</text>
  <rect x="680" y="156" width="6" height="20" rx="2" fill="#E67E22"/>
  <text x="683" y="171" font-size="8" fill="#C05621" text-anchor="middle">M</text>
  <!-- Audio packets (small blocks) -->
  <rect x="190" y="158" width="12" height="7" rx="2" fill="#FBD38D"/>
  <rect x="210" y="155" width="12" height="9" rx="2" fill="#FBD38D"/>
  <rect x="230" y="160" width="12" height="6" rx="2" fill="#FBD38D"/>
  <rect x="350" y="157" width="12" height="8" rx="2" fill="#FBD38D"/>
  <rect x="370" y="159" width="12" height="7" rx="2" fill="#FBD38D"/>
  <rect x="520" y="156" width="12" height="9" rx="2" fill="#FBD38D"/>
  <rect x="540" y="159" width="12" height="7" rx="2" fill="#FBD38D"/>
  <rect x="710" y="158" width="12" height="8" rx="2" fill="#FBD38D"/>
  <!-- Screenshot frames (taller blocks) -->
  <rect x="250" y="164" width="18" height="10" rx="2" fill="#FEEBC8" stroke="#FBD38D" stroke-width="0.5"/>
  <rect x="420" y="164" width="18" height="10" rx="2" fill="#FEEBC8" stroke="#FBD38D" stroke-width="0.5"/>
  <rect x="580" y="164" width="18" height="10" rx="2" fill="#FEEBC8" stroke="#FBD38D" stroke-width="0.5"/>

  <!-- Track 3: Online Decoding Messages -->
  <rect x="20" y="208" width="110" height="52" rx="6" fill="#FFFFFF" stroke="#4A607A" stroke-width="1.5"/>
  <text x="75" y="228" font-size="13" fill="#2C3E50" font-weight="bold" text-anchor="middle">Decoding</text>
  <text x="75" y="245" font-size="10" fill="#718096" text-anchor="middle">Online messages</text>

  <rect x="140" y="216" width="800" height="36" rx="6" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="1"/>
  <!-- Message bubbles -->
  <rect x="220" y="224" width="60" height="18" rx="9" fill="#FFFFFF" stroke="#4A607A" stroke-width="0.8"/>
  <text x="250" y="236" font-size="8" fill="#4A607A" text-anchor="middle">"the"</text>
  <rect x="390" y="224" width="70" height="18" rx="9" fill="#FFFFFF" stroke="#4A607A" stroke-width="0.8"/>
  <text x="425" y="236" font-size="8" fill="#4A607A" text-anchor="middle">"hello w"</text>
  <rect x="560" y="224" width="80" height="18" rx="9" fill="#4A607A"/>
  <text x="600" y="236" font-size="8" fill="#FFFFFF" text-anchor="middle">"hello world"</text>
  <rect x="760" y="224" width="60" height="18" rx="9" fill="#FFFFFF" stroke="#4A607A" stroke-width="0.8"/>
  <text x="790" y="236" font-size="8" fill="#4A607A" text-anchor="middle">"how"</text>

  <!-- Alignment annotation brackets -->
  <rect x="160" y="120" width="15" height="20" fill="none" stroke="#A0AEC0" stroke-width="0.8"/>
  <rect x="160" y="188" width="15" height="20" fill="none" stroke="#A0AEC0" stroke-width="0.8"/>
  <line x1="168" y1="130" x2="168" y2="198" stroke="#A0AEC0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="178" y="172" font-size="9" fill="#A0AEC0" text-anchor="start">align</text>

  <rect x="680" y="120" width="15" height="20" fill="none" stroke="#A0AEC0" stroke-width="0.8"/>
  <rect x="680" y="188" width="15" height="20" fill="none" stroke="#A0AEC0" stroke-width="0.8"/>
  <line x1="688" y1="130" x2="688" y2="198" stroke="#A0AEC0" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="340" y="2" width="280" height="22" rx="4" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  <text x="360" y="16" font-size="9" fill="#718096" text-anchor="start">M = Marker</text>
  <rect x="430" y="9" width="10" height="6" rx="2" fill="#FBD38D"/>
  <text x="445" y="16" font-size="9" fill="#718096" text-anchor="start">= Audio packet</text>
  <rect x="530" y="8" width="14" height="8" rx="2" fill="#FEEBC8" stroke="#FBD38D" stroke-width="0.5"/>
  <text x="549" y="16" font-size="9" fill="#718096" text-anchor="start">= Screenshot</text>
</svg>
