<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L10 5 L0 9 Z" fill="#2C3E50"/>
    </marker>
    <marker id="arrowLeft" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10 1 L0 5 L10 9 Z" fill="#2C3E50"/>
    </marker>
  </defs>

  <rect width="960" height="320" fill="#F8FAFC" rx="10"/>

  <!-- ===== RENDERER LAYER (top) ===== -->
  <rect x="30" y="25" width="900" height="110" fill="#EDF2F7" rx="10" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="30" y="25" width="160" height="28" rx="10" fill="#2C3E50"/>
  <text x="110" y="44" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle" letter-spacing="2">RENDERER</text>

  <!-- Vue Renderer box -->
  <rect x="65" y="66" width="240" height="52" rx="8" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.2"/>
  <text x="185" y="88" font-size="15" fill="#2C3E50" font-weight="bold" text-anchor="middle">Vue 3 Renderer</text>
  <text x="185" y="105" font-size="11" fill="#718096" text-anchor="middle">Stimulus · Preview · Decoding Display</text>

  <!-- IPC Bridge box (in renderer area) -->
  <rect x="365" y="66" width="200" height="52" rx="8" fill="#FFF7ED" stroke="#FB9231" stroke-width="1.5"/>
  <text x="465" y="88" font-size="15" fill="#C05621" font-weight="bold" text-anchor="middle">IPC Bridge</text>
  <text x="465" y="105" font-size="11" fill="#9C4221" text-anchor="middle">contextBridge · channel dispatch</text>

  <!-- Explanation text -->
  <text x="650" y="88" font-size="11" fill="#718096" text-anchor="start">Stimulus state, decoding</text>
  <text x="650" y="105" font-size="11" fill="#718096" text-anchor="start">messages flow through IPC</text>

  <!-- ===== BIDIRECTIONAL ARROWS between Renderer and IPC Bridge ===== -->
  <line x1="310" y1="92" x2="358" y2="92" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="358" y1="82" x2="310" y2="82" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowLeft)"/>

  <!-- ===== MAIN PROCESS LAYER (bottom) ===== -->
  <rect x="30" y="160" width="900" height="135" fill="#EDF2F7" rx="10" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="30" y="160" width="215" height="28" rx="10" fill="#2C3E50"/>
  <text x="138" y="179" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle" letter-spacing="2">MAIN PROCESS</text>

  <!-- Electron Main box -->
  <rect x="365" y="200" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.2"/>
  <text x="465" y="222" font-size="15" fill="#2C3E50" font-weight="bold" text-anchor="middle">Electron Main</text>
  <text x="465" y="239" font-size="11" fill="#718096" text-anchor="middle">Session · ZMQ · Audio · Screenshot</text>

  <!-- ZMQ box -->
  <rect x="640" y="200" width="220" height="52" rx="8" fill="#E67E22" stroke="#D35400" stroke-width="1.2"/>
  <text x="750" y="222" font-size="15" fill="#FFFFFF" font-weight="bold" text-anchor="middle">ZeroMQ</text>
  <text x="750" y="239" font-size="11" fill="#FED7AA" text-anchor="middle">Pub/Sub · Request/Reply · Topics</text>

  <!-- ===== IPC ⇄ Main arrows ===== -->
  <line x1="465" y1="124" x2="465" y2="193" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrowRight)"/>
  <line x1="475" y1="193" x2="475" y2="124" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="505" y="162" font-size="10" fill="#718096" font-weight="500" text-anchor="start">IPC invoke / event</text>

  <!-- ===== Main → ZMQ arrow ===== -->
  <line x1="570" y1="226" x2="633" y2="226" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrowRight)"/>

  <!-- ===== Auxiliary components in Main Process ===== -->
  <rect x="65" y="205" width="115" height="40" rx="6" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
  <text x="122" y="221" font-size="12" fill="#2C3E50" font-weight="bold" text-anchor="middle">Audio Stream</text>
  <text x="122" y="236" font-size="10" fill="#718096" text-anchor="middle">Mono mic packets</text>

  <rect x="195" y="205" width="115" height="40" rx="6" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
  <text x="252" y="221" font-size="12" fill="#2C3E50" font-weight="bold" text-anchor="middle">Screenshots</text>
  <text x="252" y="236" font-size="10" fill="#718096" text-anchor="middle">Timestamped frames</text>

  <!-- Thin connectors from Main to aux -->
  <line x1="465" y1="224" x2="315" y2="224" stroke="#A0AEC0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="465" y1="230" x2="315" y2="230" stroke="#A0AEC0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Labels for data direction -->
  <rect x="655" y="268" width="190" height="20" rx="4" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  <text x="750" y="282" font-size="10" fill="#718096" text-anchor="middle">→ markers, audio, screenshots →</text>
</svg>
