<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" width="960" height="200" font-family="'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L10 5 L0 9 Z" fill="#2C3E50"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EDF2F7"/>
    </linearGradient>
  </defs>

  <rect width="960" height="200" fill="url(#bgGrad)" rx="10"/>

  <!-- Step 1: Task YAML -->
  <rect x="20" y="55" width="152" height="90" rx="10" fill="#2C3E50" stroke="#1A252F" stroke-width="1.2"/>
  <text x="96" y="91" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Task YAML</text>
  <text x="96" y="109" font-size="10" fill="#CBD5E0" text-anchor="middle">Stimulus · Timing</text>
  <text x="96" y="126" font-size="10" fill="#CBD5E0" text-anchor="middle">Character-level config</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="100" x2="218" y2="100" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Step 2: Preview UI -->
  <rect x="228" y="55" width="152" height="90" rx="10" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.2"/>
  <text x="304" y="91" font-size="14" fill="#2C3E50" font-weight="bold" text-anchor="middle">Preview UI</text>
  <text x="304" y="109" font-size="10" fill="#718096" text-anchor="middle">Sentence display</text>
  <text x="304" y="126" font-size="10" fill="#718096" text-anchor="middle">Countdown overlay</text>

  <!-- Arrow 2→3 -->
  <line x1="388" y1="100" x2="426" y2="100" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Step 3: Marker Queue -->
  <rect x="436" y="55" width="152" height="90" rx="10" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1.2"/>
  <text x="512" y="91" font-size="14" fill="#2C3E50" font-weight="bold" text-anchor="middle">Marker Queue</text>
  <text x="512" y="109" font-size="10" fill="#718096" text-anchor="middle">Promise-ordered</text>
  <text x="512" y="126" font-size="10" fill="#718096" text-anchor="middle">Session · Word · Char</text>

  <!-- Arrow 3→4 -->
  <line x1="596" y1="100" x2="634" y2="100" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Step 4: Server Recording -->
  <rect x="644" y="55" width="152" height="90" rx="10" fill="#E67E22" stroke="#D35400" stroke-width="1.2"/>
  <text x="720" y="91" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Server Recording</text>
  <text x="720" y="109" font-size="10" fill="#FED7AA" text-anchor="middle">ZMQ topic routing</text>
  <text x="720" y="126" font-size="10" fill="#FED7AA" text-anchor="middle">EEG + Marker logs</text>

  <!-- Arrow 4→5 -->
  <line x1="804" y1="100" x2="842" y2="100" stroke="#2C3E50" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Step 5: Decoder Feedback -->
  <rect x="808" y="55" width="132" height="90" rx="10" fill="#FFFFFF" stroke="#4A607A" stroke-width="1.5"/>
  <text x="874" y="91" font-size="14" fill="#2C3E50" font-weight="bold" text-anchor="middle">Decoder</text>
  <text x="874" y="109" font-size="10" fill="#718096" text-anchor="middle">Live partial</text>
  <text x="874" y="126" font-size="10" fill="#718096" text-anchor="middle">Final sentence</text>

  <!-- Bottom label: participant-facing vs server-facing -->
  <rect x="20" y="160" width="360" height="26" rx="4" fill="none" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="177" font-size="10" fill="#718096" font-weight="500" text-anchor="middle">Participant-facing (Renderer)</text>

  <rect x="644" y="160" width="296" height="26" rx="4" fill="none" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="792" y="177" font-size="10" fill="#718096" font-weight="500" text-anchor="middle">Server / Decoder (Main Process)</text>
</svg>
